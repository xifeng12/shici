server {
    listen 80;
    server_name ${SHICI_DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${SHICI_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${SHICI_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SHICI_DOMAIN}/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://poetry.palemoky.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host poetry.palemoky.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
